<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리동네 생활 SOC 시설 지도</title>
    <style>
        /* 기본 레이아웃 및 공공서비스 디자인 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; color: #333; }

        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 */
        #sidebar {
            width: 380px;
            height: 100%;
            padding: 20px;
            background: #ffffff;
            box-shadow: 3px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* 서비스 타이틀 */
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 1단계: 지역 검색창 */
        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: 2px solid #1e3a8a;
        }

        .search-btn {
            padding: 12px 18px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .search-btn:hover {
            background: #172554;
        }

        /* 2단계: 시설 카테고리 선택 (라디오 버튼 스타일) */
        .category-group {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .category-label {
            flex: 1;
            text-align: center;
        }

        .category-label input[type="radio"] {
            display: none;
        }

        .category-label span {
            display: block;
            padding: 10px 5px;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .category-label input[type="radio"]:checked + span {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        /* 탭 시스템 (2개 이상) */
        .tab-menu {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            color: #64748b;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #1e3a8a;
            border-bottom: 3px solid #1e3a8a;
            margin-bottom: -2px;
        }

        /* 탭 콘텐츠 영역 */
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* 결과 카운트 */
        .result-count {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .result-count span {
            color: #ef4444;
            font-weight: bold;
        }

        /* 탭 1: 시설 목록 아이템 스타일 */
        #result-list {
            list-style: none;
        }

        .item {
            padding: 15px;
            border: 1px solid #f1f5f9;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .item strong {
            font-size: 15px;
            color: #0f172a;
            display: block;
            margin-bottom: 4px;
        }

        .item .address {
            font-size: 13px;
            color: #475569;
            margin-bottom: 2px;
        }

        .item .phone {
            font-size: 12px;
            color: #059669;
        }

        .item .distance {
            font-size: 11px;
            color: #ef4444;
            font-weight: bold;
            margin-top: 4px;
        }

        /* 탭 2: 분석 통계 화면 스타일 */
        .stats-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .stats-title {
            font-size: 14px;
            font-weight: bold;
            color: #334155;
            margin-bottom: 10px;
        }

        .chart-row {
            margin-bottom: 12px;
        }

        .chart-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #475569;
            margin-bottom: 4px;
        }

        .bar-container {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .bg-blue { background: #2563eb; }
        .bg-green { background: #16a34a; }
        .bg-red { background: #dc2626; }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* 인포윈도우 스타일 */
        .info-window {
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
            width: 220px;
        }
        .info-window strong { color: #1e3a8a; font-size: 13px; display: block; margin-bottom: 4px;}
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="title">🏢 생활 SOC 종합 분석 지도</div>
        
        <div class="search-box">
            <input type="text" id="region-keyword" placeholder="시/군/구 또는 동네 이름 입력 (예: 마포구)">
            <button class="search-btn" onclick="searchCombine()">검색</button>
        </div>

        <div class="category-group">
            <label class="category-label">
                <input type="radio" name="facility-category" value="도서관" checked onclick="searchCombine()">
                <span>📚 도서관</span>
            </label>
            <label class="category-label">
                <input type="radio" name="facility-category" value="체육관" onclick="searchCombine()">
                <span>💪 체육관</span>
            </label>
            <label class="category-label">
                <input type="radio" name="facility-category" value="복지관" onclick="searchCombine()">
                <span>🤝 복지관</span>
            </label>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('tab-list', this)">📋 시설 목록</button>
            <button class="tab-btn" onclick="switchTab('tab-stats', this)">📊 지역 인프라 분석</button>
        </div>

        <div id="tab-list" class="tab-content active">
            <div class="result-count">선택한 시설: <span id="count-num">0</span>개 검색됨</div>
            <ul id="result-list"></ul>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="stats-box">
                <div class="stats-title" id="stats-region-title">현재 지역 인프라 확보 수준</div>
                
                <div class="chart-row">
                    <div class="chart-label"><span>📚 도서관</span><span id="stat-count-lib">0개</span></div>
                    <div class="bar-container"><div id="bar-lib" class="bar-fill bg-blue"></div></div>
                </div>

                <div class="chart-row">
                    <div class="chart-label"><span>💪 체육 시설</span><span id="stat-count-gym">0개</span></div>
                    <div class="bar-container"><div id="bar-gym" class="bar-fill bg-green"></div></div>
                </div>

                <div class="chart-row">
                    <div class="chart-label"><span>🤝 복지 시설</span><span id="stat-count-welfare">0개</span></div>
                    <div class="bar-container"><div id="bar-welfare" class="bar-fill bg-red"></div></div>
                </div>
            </div>
            <p style="font-size: 12px; color: #64748b; line-height: 1.4; padding: 0 5px;">
                ※ 본 데이터는 해당 지역 중심 기준 반경 내 검색 결과를 바탕으로 계산된 수치입니다. 데이터가 많을수록 바가 길게 표시됩니다.
            </p>
        </div>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

<script>
    // 전역 변수 설정
    let map;
    let ps; // 장소 검색 객체
    let userLocation = null; // 사용자의 실시간 현재 위치
    let markers = []; // 지도에 표시된 마커 관리 배열
    let activeInfoWindow = null; // 열려있는 인포윈도우 관리

    // 마커 이미지 정보
    const markerImages = {
        library: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_blue.png",
        gym: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_green.png",
        welfare: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png",
        user: "https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png"
    };

    // 통계 연산을 위한 임시 저장소
    let statsData = { 도서관: 0, 체육관: 0, 복지관: 0 };

    window.onload = function() {
        initMap();
    };

    // 지도 초기설정
    function initMap() {
        const mapContainer = document.getElementById('map'); 
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 서울시청 기본
            level: 5
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();

        // 사용자의 현재 위치 요청
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                userLocation = new kakao.maps.LatLng(lat, lon);
                map.setCenter(userLocation);
                displayUserMarker(userLocation, '내 현재 위치');
            });
        }
    }

    // 내 위치 마커 찍기
    function displayUserMarker(locPosition, message) {
        const imageSize = new kakao.maps.Size(35, 35);
        const markerImage = new kakao.maps.MarkerImage(markerImages.user, imageSize);
        const marker = new kakao.maps.Marker({
            map: map,
            position: locPosition,
            image: markerImage
        });
        const infowindow = new kakao.maps.InfoWindow({
            content : `<div style="padding:5px; font-size:12px; text-align:center;">${message}</div>`
        });
        infowindow.open(map, marker);
    }

    // 탭 전환 기능 함수
    function switchTab(tabId, element) {
        // 모든 탭 콘텐츠 숨기기
        const contents = document.querySelectorAll('.tab-content');
        contents.forEach(content => content.classList.remove('active'));

        // 모든 탭 버튼 비활성화
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));

        // 클릭된 탭 활성화
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    // 지역 + 카테고리 융합 검색 메인 로직
    function searchCombine() {
        const region = document.getElementById('region-keyword').value.trim();
        const category = document.querySelector('input[name="facility-category"]:checked').value;

        if (!region) {
            alert('지역명을 먼저 입력해주세요! (예: 마포구, 정발산동)');
            return;
        }

        // 최종 키워드 조합 (예: "마포구 도서관")
        const finalKeyword = `${region} ${category}`;
        
        // 검색 실행 전 통계 데이터를 구하기 위해 3가지 카테고리를 백그라운드 연산 유도 시도
        // 우선 현재 선택된 카테고리 리스트 출력을 선행함
        ps.keywordSearch(finalKeyword, placesSearchCB);

        // 통계 탭 정보 갱신을 위한 지역명 텍스트 변경
        document.getElementById('stats-region-title').innerText = `📊 ${region} 인프라 분석`;
        
        // 통계 시뮬레이션용 데이터 쿼리 백그라운드 호출 (동일 지역 다른 시설 분포 알아내기)
        updateBackgroundStats(region);
    }

    // 키워드 결과 콜백
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            // 내 위치 기준 정렬 처리
            if (userLocation) {
                data.forEach(function(place) {
                    place.distanceFromUser = calculateDistance(
                        userLocation.getLat(), userLocation.getLng(), 
                        parseFloat(place.y), parseFloat(place.x)
                    );
                });
                data.sort((a, b) => a.distanceFromUser - b.distanceFromUser);
            }
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            clearPreviousResults();
            alert('검색 결과가 존재하지 않습니다.');
        }
    }

    // 거리 계산 함수
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c * 1000;
    }

    // 기존 결과 청소
    function clearPreviousResults() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
        document.getElementById('result-list').innerHTML = '';
        document.getElementById('count-num').innerText = '0';
        if (activeInfoWindow) activeInfoWindow.close();
    }

    // 마커 및 리스트 렌더링 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('result-list');
        const countNumEl = document.getElementById('count-num');
        const bounds = new kakao.maps.LatLngBounds();
        
        clearPreviousResults();
        countNumEl.innerText = places.length;

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const placeName = places[i].place_name;
            const addressName = places[i].road_address_name ? places[i].road_address_name : places[i].address_name;
            const phoneNumber = places[i].phone ? places[i].phone : '전화번호 정보없음';
            
            let distanceText = '';
            if (places[i].distanceFromUser) {
                const distance = places[i].distanceFromUser;
                distanceText = distance >= 1000 ? `(내 위치에서 ${(distance/1000).toFixed(1)}km)` : `(
