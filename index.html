<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리동네 생활 SOC 종합 분석 지도</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; color: #333; }

        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 */
        #sidebar {
            width: 380px;
            height: 100%;
            padding: 20px;
            background: #ffffff;
            box-shadow: 3px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 15px;
        }

        /* 검색창 */
        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus { outline: 2px solid #1e3a8a; }

        .search-btn {
            padding: 12px 18px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .search-btn:hover { background: #172554; }

        /* 가로 스크롤 카테고리 바 */
        .category-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .category-container::-webkit-scrollbar { height: 5px; }
        .category-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }

        .category-btn {
            display: inline-block;
            padding: 8px 14px;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5px;
            transition: all 0.2s;
        }

        .category-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        /* 탭 구조 */
        .tab-menu {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            color: #64748b;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .tab-btn.active {
            color: #1e3a8a;
            border-bottom: 3px solid #1e3a8a;
            margin-bottom: -2px;
        }

        .tab-content { display: none; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }

        .result-count { font-size: 13px; color: #64748b; margin-bottom: 10px; }
        .result-count span { color: #ef4444; font-weight: bold; }

        /* 리스트 스타일 */
        #result-list { list-style: none; }
        .item {
            padding: 15px;
            border: 1px solid #f1f5f9;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .item:hover { background: #f8fafc; border-color: #cbd5e1; }
        .item strong { font-size: 15px; color: #0f172a; display: block; margin-bottom: 4px; }
        
        .item .tag {
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .tag-blue { background: #eff6ff; color: #2563eb; }
        .tag-green { background: #f0fdf4; color: #16a34a; }
        .tag-red { background: #fef2f2; color: #dc2626; }

        .item .address { font-size: 13px; color: #475569; margin-bottom: 2px; }
        .item .phone { font-size: 12px; color: #059669; }
        .item .distance { font-size: 11px; color: #ef4444; font-weight: bold; margin-top: 4px; }

        /* 통계 탭 */
        .stats-container { background: #f8fafc; padding: 15px; border-radius: 8px; }
        .stats-title { font-size: 14px; font-weight: bold; color: #334155; margin-bottom: 15px; }
        .chart-row { margin-bottom: 12px; }
        .chart-label { display: flex; justify-content: space-between; font-size: 12px; color: #475569; margin-bottom: 4px; }
        .bar-container { width: 100%; height: 10px; background: #e2e8f0; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.4s ease-out; }

        .bg-blue { background: #2563eb; }
        .bg-green { background: #16a34a; }
        .bg-red { background: #dc2626; }

        /* 오른쪽 지도 */
        #map { flex: 1; height: 100%; }

        /* 인포윈도우 */
        .info-window { padding: 10px; font-size: 12px; line-height: 1.5; width: 220px; }
        .info-window strong { color: #1e3a8a; font-size: 13px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="title">🏢 생활 SOC 종합 분석 지도</div>
        
        <div class="search-box">
            <input type="text" id="region-keyword" placeholder="동네 이름 입력 (예: 부천, 마포구)">
            <button class="search-btn" onclick="searchAllSOC()">검색</button>
        </div>

        <div class="category-container">
            <button class="category-btn active" onclick="filterCategory('전체', this)">🌐 전체보기</button>
            <button class="category-btn" onclick="filterCategory('병원', this)">🏥 병원</button>
            <button class="category-btn" onclick="filterCategory('약국', this)">💊 약국</button>
            <button class="category-btn" onclick="filterCategory('주민센터', this)">🏛️ 주민센터</button>
            <button class="category-btn" onclick="filterCategory('구청', this)">🏢 구청</button>
            <button class="category-btn" onclick="filterCategory('보건소', this)">🩺 보건소</button>
            <button class="category-btn" onclick="filterCategory('사회복지관', this)">🤝 사회복지관</button>
            <button class="category-btn" onclick="filterCategory('도서관', this)">📚 도서관</button>
            <button class="category-btn" onclick="filterCategory('박물관', this)">🏺 박물관</button>
            <button class="category-btn" onclick="filterCategory('미술관', this)">🎨 미술관</button>
            <button class="category-btn" onclick="filterCategory('학교', this)">🏫 학교</button>
            <button class="category-btn" onclick="filterCategory('체육관', this)">💪 체육관</button>
            <button class="category-btn" onclick="filterCategory('수영장', this)">🏊 수영장</button>
            <button class="category-btn" onclick="filterCategory('공원', this)">🌳 공원</button>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('tab-list', this)">📋 시설 목록</button>
            <button class="tab-btn" onclick="switchTab('tab-stats', this)">📊 지역 인프라 분석</button>
        </div>

        <div id="tab-list" class="tab-content active">
            <div class="result-count">표시된 시설: <span id="count-num">0</span>개</div>
            <ul id="result-list"></ul>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="stats-container">
                <div class="stats-title" id="stats-region-title">현재 지역 인프라 확보 수준</div>
                <div id="stats-charts-box"></div>
            </div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

<script>
    let map, ps, geocoder;
    let userLocation = null; 
    let allPlacesData = []; // 검색 데이터 통합 마스터 배열
    let markers = []; 
    let activeInfoWindow = null; 

    const markerImages = {
        blue: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_blue.png",
        green: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_green.png",
        red: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png",
        user: "https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png"
    };

    const socCategories = {
        '병원': { color: 'blue', type: '의료/복지' },
        '약국': { color: 'blue', type: '의료/복지' },
        '주민센터': { color: 'green', type: '공공/행정' },
        '구청': { color: 'green', type: '공공/행정' },
        '보건소': { color: 'blue', type: '의료/복지' },
        '사회복지관': { color: 'blue', type: '의료/복지' },
        '도서관': { color: 'red', type: '문화/교육' },
        '박물관': { color: 'red', type: '문화/교육' },
        '미술관': { color: 'red', type: '문화/교육' },
        '학교': { color: 'green', type: '문화/교육' },
        '체육관': { color: 'red', type: '체육/휴양' },
        '수영장': { color: 'red', type: '체육/휴양' },
        '공원': { color: 'red', type: '체육/휴양' }
    };

    window.onload = function() { initMap(); };

    function initMap() {
        const mapContainer = document.getElementById('map'); 
        map = new kakao.maps.Map(mapContainer, { center: new kakao.maps.LatLng(37.566826, 126.9786567), level: 6 });
        ps = new kakao.maps.services.Places();
        geocoder = new kakao.maps.services.Geocoder(); // 주소 변환기 등록

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userLocation = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                map.setCenter(userLocation);
                const marker = new kakao.maps.Marker({ map: map, position: userLocation, image: new kakao.maps.MarkerImage(markerImages.user, new kakao.maps.Size(35, 35)) });
                const info = new kakao.maps.InfoWindow({ content: '<div style="padding:5px;font-size:12px;">내 현재 위치</div>' });
                info.open(map, marker);
            });
        }
    }

    // 🔍 통합 검색 메인 함수 (지역명 검색 시 주소 변환 후 데이터 수집)
    function searchAllSOC() {
        const regionInput = document.getElementById('region-keyword').value.trim();
        if (!regionInput) { alert('지역명을 입력해주세요! (예: 부천)'); return; }

        // 1단계: 주소 검색 서비스로 해당 지역의 명확한 중심 좌표를 먼저 땀
        geocoder.addressSearch(regionInput, async function(result, status) {
            if (status !== kakao.maps.services.Status.OK) {
                alert('정확한 지역 위치를 판별할 수 없습니다. 동네명을 다시 확인해주세요.');
                return;
            }

            const targetCoords = new kakao.maps.LatLng(result[0].y, result[0].x);
            map.setCenter(targetCoords); // 해당 지역으로 지도 즉시 이동
            map.setLevel(6);

            allPlacesData = [];
            clearPreviousMarkers();
            document.getElementById('result-list').innerHTML = '';
            if (activeInfoWindow) activeInfoWindow.close();

            // 필터 버튼 초기화
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttons[0].classList.add('active');

            document.getElementById('stats-region-title').innerText = `📊 ${regionInput} 인프라 분석`;

            // 13개 카테고리 장소 검색 비동기 병렬 처리
            const searchPromises = Object.keys(socCategories).map(category => {
                return new Promise((resolve) => {
                    // 키워드 조합: "부천 도서관" 등
                    ps.keywordSearch(`${regionInput} ${category}`, function(data, status) {
                        if (status === kakao.maps.services.Status.OK) {
                            data.forEach(item => {
                                item.customCategory = category;
                                item.distanceFromCenter = calculateDistance(targetCoords.getLat(), targetCoords.getLng(), parseFloat(item.y), parseFloat(item.x));
                            });
                            resolve(data);
                        } else {
                            resolve([]);
                        }
                    }, { location: targetCoords, radius: 5000, size: 15 }); // 검색 중심점 기준 5km 반경 제한으로 정확도 극대화
                });
            });

            const totalResults = await Promise.all(searchPromises);
            totalResults.forEach(resArr => { allPlacesData = allPlacesData.concat(resArr); });

            if (allPlacesData.length === 0) { alert('해당 동네 인프라 검색 결과가 없습니다.'); return; }

            // 중심 좌표 기준 가까운 순 정렬
            allPlacesData.sort((a, b) => a.distanceFromCenter - b.distanceFromCenter);

            renderStats();
            renderPlaces(allPlacesData); // 전체 목록 표출
        });
    }

    // 🎯 카테고리 필터 버튼 이벤트 처리 (지도 바운드 재조정 결함 해결)
    function filterCategory(categoryType, element) {
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        if (allPlacesData.length === 0) return;

        if (categoryType === '전체') {
            renderPlaces(allPlacesData);
        } else {
            const filtered = allPlacesData.filter(item => item.customCategory === categoryType);
            renderPlaces(filtered);
        }
    }

    // 📋 마커 생성 및 목록 화면 실시간 동기화 출력 함수
    function renderPlaces(placesList) {
        const listEl = document.getElementById('result-list');
        const countNumEl = document.getElementById('count-num');
        const bounds = new kakao.maps.LatLngBounds();

        clearPreviousMarkers();
        listEl.innerHTML = '';
        if (activeInfoWindow) activeInfoWindow.close();

        countNumEl.innerText = placesList.length;

        if (placesList.length === 0) {
            listEl.innerHTML = '<li style="padding:15px; text-align:center; color:#94a3b8; font-size:13px;">해당 시설이 존재하지 않습니다.</li>';
            return;
        }

        for (let i = 0; i < placesList.length; i++) {
            const item = placesList[i];
            const placePosition = new kakao.maps.LatLng(item.y, item.x);
            const addressName = item.road_address_name ? item.road_address_name : item.address_name;
            const phoneNumber = item.phone ? item.phone : '정보없음';

            const catInfo = socCategories[item.customCategory];
            const markerColor = catInfo ? catInfo.color : 'red';

            const marker = new kakao.maps.Marker({
                map: map,
                position: placePosition,
                image: new kakao.maps.MarkerImage(markerImages[markerColor], new kakao.maps.Size(24, 35))
            });
            markers.push(marker);

            const infowindow = new kakao.maps.InfoWindow({
                content: `
                    <div class="info-window">
                        <strong>${item.place_name}</strong>
                        <div style="color:#64748b; font-size:11px; margin-bottom:3px;">[${catInfo.type} - ${item.customCategory}]</div>
                        <div>📍 주소: ${addressName}</div>
                        <div class="phone">📞 전화: ${phoneNumber}</div>
                    </div>
                `,
                removable: true
            });

            kakao.maps.event.addListener(marker, 'click', function() {
                if (activeInfoWindow) activeInfoWindow.close();
                infowindow.open(map, marker);
                activeInfoWindow = infowindow;
            });

            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `
                <span class="tag tag-${markerColor}">${item.customCategory}</span>
                <strong>${item.place_name}</strong>
                <div class="address">${addressName}</div>
                <div class="phone">${phoneNumber}</div>
                <div class="distance">(검색 중심에서 ${Math.round(item.distanceFromCenter)}m)</div>
            `;

            itemEl.onclick = function() {
                map.setCenter(placePosition);
                map.setLevel(4);
                if (activeInfoWindow) activeInfoWindow.close();
                infowindow.open(map, marker);
                activeInfoWindow = infowindow;
            };

            listEl.appendChild(itemEl);
            bounds.extend(placePosition); // 범위를 동적으로 계속 주입
        }

        // ⭐ 핵심: 변경된 시설 데이터 집합에 맞춰 지도의 시야각과 화면 구도를 강제로 자동 재설정!
        map.setBounds(bounds);
    }

    // 📊 통계 차트 동적 빌드
    function renderStats() {
        const chartsBox = document.getElementById('stats-charts-box');
        chartsBox.innerHTML = '';

        Object.keys(socCategories).forEach(category => {
            const count = allPlacesData.filter(item => item.customCategory === category).length;
            const colorClass = socCategories[category].color;
            const percentage = Math.min((count / 15) * 100, 100);

            chartsBox.innerHTML += `
                <div class="chart-row">
                    <div class="chart-label"><span>${category}</span><strong>${count}개</strong></div>
                    <div class="bar-container"><div class="bar-fill bg-${colorClass}" style="width: ${percentage}%"></div></div>
                </div>
            `;
        });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1
