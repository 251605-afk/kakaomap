<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 레이아웃 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; }

        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 (검색 및 리스트) */
        #sidebar {
            width: 350px;
            height: 100%;
            padding: 20px;
            background: #f8f9fa;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 10;
            overflow-y: auto;
        }

        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            background: #ffeb00; /* 카카오 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }

        #result-list {
            list-style: none;
        }

        .item {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="search-box">
            <input type="text" id="keyword" placeholder="장소를 입력하세요">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <ul id="result-list">
            </ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

<script>
    // 전역 변수 설정
    let map;
    let ps; // 장소 검색 객체

    // 1. 페이지 로드 시 실행
    window.onload = function() {
        initMap();
    };

    // 2. 지도 초기화 함수
    function initMap() {
        const mapContainer = document.getElementById('map'); 
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 위치 권한 거부 시 기본 좌표 (서울시청)
            level: 5 // 요청하신 확대 레벨 5
        };

        // 지도 생성
        map = new kakao.maps.Map(mapContainer, mapOption);
        
        // 장소 검색 객체 생성
        ps = new kakao.maps.services.Places();

        // 3. 현재 위치 권한 요청
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude; // 위도
                const lon = position.coords.longitude; // 경도
                
                const locPosition = new kakao.maps.LatLng(lat, lon);
                
                // 지도 중심을 현재 위치로 이동
                map.setCenter(locPosition);
                
                // 내 위치 마커 표시
                displayMarker(locPosition, '여기에 계신가요?');
            }, function(error) {
                console.error("위치 정보를 가져오는데 실패했습니다.", error);
            });
        }
    }

    // 마커 표시 함수
    function displayMarker(locPosition, message) {
        const marker = new kakao.maps.Marker({
            map: map,
            position: locPosition
        });

        const iwContent = `<div style="padding:5px;">${message}</div>`;
        const infowindow = new kakao.maps.InfoWindow({
            content : iwContent,
            removable : true
        });

        infowindow.open(map, marker);
    }

    // 4. 장소 검색 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return;
        }

        // 카카오 장소 검색 API 호출
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 장소 검색 완료 시 호출되는 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 검색 결과를 왼쪽 리스트에 표시하는 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        listEl.innerHTML = ''; // 이전 결과 초기화

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            // 리스트 아이템 추가
            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `<strong>${places[i].place_name}</strong><br><small>${places[i].address_name}</small>`;
            listEl.appendChild(itemEl);

            // 지도에 마커 추가
            const marker = new kakao.maps.Marker({
                map: map,
                position: placePosition
            });

            // 검색된 장소들을 포함하도록 지도 범위 확장
            bounds.extend(placePosition);
        }
        
        // 검색 결과에 맞춰 지도 화면 이동
        map.setBounds(bounds);
    }
</script>

</body>
</html>
