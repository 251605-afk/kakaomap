<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리동네 생활 SOC 종합 서비스 지도</title>
    <style>
        /* 기본 레이아웃 및 공공서비스 디자인 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; color: #333; }

        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 */
        #sidebar {
            width: 380px;
            height: 100%;
            padding: 20px;
            background: #ffffff;
            box-shadow: 3px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* 서비스 타이틀 */
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 지역 검색창 */
        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: 2px solid #1e3a8a;
        }

        .search-btn {
            padding: 12px 18px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .search-btn:hover {
            background: #172554;
        }

        /* 13개 시설 카테고리 가로 스크롤 영역 */
        .category-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* 가로 스크롤바 디자인 예쁘게 다듬기 */
        .category-container::-webkit-scrollbar {
            height: 5px;
        }
        .category-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }

        .category-btn {
            display: inline-block;
            padding: 8px 14px;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5px;
            transition: all 0.2s;
        }

        .category-btn:hover {
            background: #e2e8f0;
        }

        .category-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        /* 탭 시스템 */
        .tab-menu {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            color: #64748b;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #1e3a8a;
            border-bottom: 3px solid #1e3a8a;
            margin-bottom: -2px;
        }

        /* 탭 콘텐츠 영역 */
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* 결과 카운트 */
        .result-count {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .result-count span {
            color: #ef4444;
            font-weight: bold;
        }

        /* 시설 목록 아이템 스타일 */
        #result-list {
            list-style: none;
        }

        .item {
            padding: 15px;
            border: 1px solid #f1f5f9;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .item strong {
            font-size: 15px;
            color: #0f172a;
            display: block;
            margin-bottom: 4px;
        }

        .item .tag {
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .tag-blue { background: #eff6ff; color: #2563eb; }
        .tag-green { background: #f0fdf4; color: #16a34a; }
        .tag-red { background: #fef2f2; color: #dc2626; }

        .item .address {
            font-size: 13px;
            color: #475569;
            margin-bottom: 2px;
        }

        .item .phone {
            font-size: 12px;
            color: #059669;
        }

        .item .distance {
            font-size: 11px;
            color: #ef4444;
            font-weight: bold;
            margin-top: 4px;
        }

        /* 분석 통계 화면 스타일 */
        .stats-container {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            max-height: 100%;
            overflow-y: auto;
        }

        .stats-title {
            font-size: 14px;
            font-weight: bold;
            color: #334155;
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .chart-row {
            margin-bottom: 12px;
        }

        .chart-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #475569;
            margin-bottom: 4px;
        }

        .bar-container {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .bg-blue { background: #2563eb; }
        .bg-green { background: #16a34a; }
        .bg-red { background: #dc2626; }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* 인포윈도우 스타일 */
        .info-window {
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
            width: 220px;
        }
        .info-window strong { color: #1e3a8a; font-size: 13px; display: block; margin-bottom: 4px;}
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="title">🏢 생활 SOC 종합 분석 지도</div>
        
        <div class="search-box">
            <input type="text" id="region-keyword" placeholder="시/군/구 또는 동네 이름 (예: 부천)">
            <button class="search-btn" onclick="searchAllSOC()">검색</button>
        </div>

        <div class="category-container" id="category-bar">
            <button class="category-btn active" onclick="filterCategory('전체', this)">🌐 전체보기</button>
            <button class="category-btn" onclick="filterCategory('병원', this)">🏥 병원</button>
            <button class="category-btn" onclick="filterCategory('약국', this)">💊 약국</button>
            <button class="category-btn" onclick="filterCategory('주민센터', this)">🏛️ 주민센터</button>
            <button class="category-btn" onclick="filterCategory('구청', this)">🏢 구청</button>
            <button class="category-btn" onclick="filterCategory('보건소', this)">🩺 보건소</button>
            <button class="category-btn" onclick="filterCategory('사회복지관', this)">🤝 사회복지관</button>
            <button class="category-btn" onclick="filterCategory('도서관', this)">📚 도서관</button>
            <button class="category-btn" onclick="filterCategory('박물관', this)">🏺 박물관</button>
            <button class="category-btn" onclick="filterCategory('미술관', this)">🎨 미술관</button>
            <button class="category-btn" onclick="filterCategory('학교', this)">🏫 학교</button>
            <button class="category-btn" onclick="filterCategory('체육관', this)">💪 체육관</button>
            <button class="category-btn" onclick="filterCategory('수영장', this)">🏊 수영장</button>
            <button class="category-btn" onclick="filterCategory('공원', this)">🌳 공원</button>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('tab-list', this)">📋 시설 목록</button>
            <button class="tab-btn" onclick="switchTab('tab-stats', this)">📊 지역 인프라 분석</button>
        </div>

        <div id="tab-list" class="tab-content active">
            <div class="result-count">표시된 시설: <span id="count-num">0</span>개</div>
            <ul id="result-list"></ul>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="stats-container">
                <div class="stats-title" id="stats-region-title">현재 지역 인프라 확보 수준</div>
                <div id="stats-charts-box">
                    </div>
            </div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

<script>
    // 전역 변수 설정
    let map;
    let ps; 
    let userLocation = null; 
    let allPlacesData = []; // 검색된 13개 카테고리의 모든 시설 데이터를 결합 보관할 마스터 배열
    let markers = []; 
    let activeInfoWindow = null; 

    // 카카오맵 3가지 컬러 마커 이미지 연동
    const markerImages = {
        blue: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_blue.png",   // 의료, 복지
        green: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_green.png", // 공공, 행정, 교육
        red: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png",     // 문화, 체육, 공원
        user: "https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png"        // 내 현재 위치
    };

    // 13개 카테고리 정의 및 시각화용 색상 그룹 지정
    const socCategories = {
        '병원': { color: 'blue', type: '의료/복지' },
        '약국': { color: 'blue', type: '의료/복지' },
        '주민센터': { color: 'green', type: '공공/행정' },
        '구청': { color: 'green', type: '공공/행정' },
        '보건소': { color: 'blue', type: '의료/복지' },
        '사회복지관': { color: 'blue', type: '의료/복지' },
        '도서관': { color: 'red', type: '문화/교육' },
        '박물관': { color: 'red', type: '문화/교육' },
        '미술관': { color: 'red', type: '문화/교육' },
        '학교': { color: 'green', type: '문화/교육' },
        '체육관': { color: 'red', type: '체육/휴양' },
        '수영장': { color: 'red', type: '체육/휴양' },
        '공원': { color: 'red', type: '체육/휴양' }
    };

    window.onload = function() {
        initMap();
    };

    // 지도 초기설정
    function initMap() {
        const mapContainer = document.getElementById('map'); 
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), 
            level: 6
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                userLocation = new kakao.maps.LatLng(lat, lon);
                map.setCenter(userLocation);
                displayUserMarker(userLocation, '내 현재 위치');
            });
        }
    }

    function displayUserMarker(locPosition, message) {
        const imageSize = new kakao.maps.Size(35, 35);
        const markerImage = new kakao.maps.MarkerImage(markerImages.user, imageSize);
        const marker = new kakao.maps.Marker({ map: map, position: locPosition, image: markerImage });
        const infowindow = new kakao.maps.InfoWindow({ content : `<div style="padding:5px; font-size:12px; text-align:center;">${message}</div>` });
        infowindow.open(map, marker);
    }

    // 🚀 핵심 안정성 개선: Promise 기반 비동기 대기 처리를 통한 13개 카테고리 완전 동시 검색
    async function searchAllSOC() {
        const regionInput = document.getElementById('region-keyword').value.trim();

        if (!regionInput) {
            alert('지역명을 입력해주세요! (예: 부천)');
            return;
        }

        allPlacesData = [];
        clearPreviousResults();
        if (activeInfoWindow) activeInfoWindow.close();
        
        // 카테고리 스크롤바 버튼 스타일 '전체보기'로 강제 리셋
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        buttons[0].classList.add('active');

        document.getElementById('stats-region-title').innerText = `📊 ${regionInput} 인프라 분석`;

        // 개별 카테고리 검색을 Promise 객체로 래핑하여 튕김 현상 원천 차단
        const searchPromises = Object.keys(socCategories).map(category => {
            return new Promise((resolve) => {
                ps.keywordSearch(`${regionInput} ${category}`, function(data, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        data.forEach(item => {
                            item.customCategory = category; // 고유 카테고리 태깅
                            if (userLocation) {
                                item.distanceFromUser = calculateDistance(
                                    userLocation.getLat(), userLocation.getLng(),
                                    parseFloat(item.y), parseFloat(item.x)
                                );
                            } else {
                                item.distanceFromUser = 0;
                            }
                        });
                        resolve(data);
                    } else {
                        resolve([]); // 데이터가 없는 카테고리도 에러 없이 빈 배열 반환하여 흐름 유지
                    }
                }, { page: 1, size: 10 }); // 균형 있는 노출을 위해 단위당 최대 10개 수집
            });
        });

        // 13개 API 요청이 완전하게 다 올 때까지 안전하게 대기(Await)
        const totalResults = await Promise.all(searchPromises);
        
        // 2차원 결과를 1차원 마스터 배열로 플래싱 병합
        totalResults.forEach(resultArray => {
            allPlacesData = allPlacesData.concat(resultArray);
        });

        if (allPlacesData.length === 0) {
            alert('검색 결과가 존재하지 않거나 정확하지 않은 지역명입니다.');
            return;
        }

        // 거리 기준 정렬 순서 보정
        if (userLocation) {
            allPlacesData.sort((a, b) => a.distanceFromUser - b.distanceFromUser);
        }

        // 대시보드 화면 갱신 및 마커 생성
        renderStats();
        renderPlaces(allPlacesData);
    }

    // 🎯 실시간 카테고리 필터 가공 시스템
    function filterCategory(categoryType, element) {
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        if (allPlacesData.length === 0) return;

        if (categoryType === '전체') {
            renderPlaces(allPlacesData);
        } else {
            const filtered = allPlacesData.filter(item => item.customCategory === categoryType);
            renderPlaces(filtered);
        }
    }

    // 실제 화면에 마커 및 리스트 엘리먼트를 바인딩 렌더링하는 함수
    function renderPlaces(placesList) {
        const listEl = document.getElementById('result-list');
        const countNumEl = document.getElementById('count-num');
        const bounds = new kakao.maps.LatLngBounds();

        clearPreviousMarkersOnly();
        listEl.innerHTML = '';
        if (activeInfoWindow) activeInfoWindow.close();

        countNumEl.innerText = placesList.length;

        for (let i = 0; i < placesList.length; i++) {
            const item = placesList[i];
            const placePosition = new kakao.maps.LatLng(item.y, item.x);
            const addressName = item.road_address_name ? item.road_address_name : item.address_name;
            const phoneNumber = item.phone ? item.phone : '전화번호 정보없음';

            let distanceText = '';
            if (item.distanceFromUser) {
                const distance = item.distanceFromUser;
                distanceText = distance >= 1000 ? `(내 위치에서 ${(distance/1000).toFixed(1)}km)` : `(내 위치에서 ${Math.round(distance)}m)`;
            }

            // 카테고리 고유 지정색에 맞는 마커핀 할당
            const catInfo = socCategories[item.customCategory];
            const markerColor = catInfo ? catInfo.color : 'red';
            const markerImgUrl = markerImages[markerColor];

            const imageSize = new kakao.maps.Size(24, 35);
            const markerImage = new kakao.maps.MarkerImage(markerImgUrl, imageSize);

            const marker = new kakao.maps.Marker({ map: map, position: placePosition, image: markerImage });
            markers.push(marker);

            const infoContent = `
                <div class="info-window">
                    <strong>${item.place_name}</strong>
                    <div style="color:#64748b; font-weight:bold; font-size:11px; margin-bottom:3px;">[${catInfo.type} - ${item.customCategory}]</div>
                    <div>📍 주소: ${addressName}</div>
                    <div class="phone">📞 전화: ${phoneNumber}</div>
                </div>
            `;
            
            const infowindow = new kakao.maps.InfoWindow({ content: infoContent, removable: true });

            kakao.maps.event.addListener(marker, 'click', function() {
                if (activeInfoWindow) activeInfoWindow.close();
                infowindow.open(map, marker);
                activeInfoWindow = infowindow;
            });

            // 리스트 아이템 엘리먼트 생성
            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `
                <span class="tag tag-${markerColor}">${item.customCategory}</span>
                <strong>${item.place_name}</strong>
                <div class="address">${addressName}</div>
                <div class="phone">${phoneNumber}</div>
                <div class="distance">${distanceText}</div>
            `;

            itemEl.onclick = function() {
                map.setCenter(placePosition);
                map.setLevel(4);
                if (activeInfoWindow) activeInfoWindow.close();
                infowindow.open(map, marker);
                activeInfoWindow = infowindow;
            };

            listEl.appendChild(itemEl);
            bounds.extend(placePosition);
        }

        if (placesList.length > 0) {
            map.setBounds(bounds);
        }
    }

    // 📊 13개 전용 통계 대시보드 그래프 동적 동기화 구현
    function renderStats() {
        const chartsBox = document.getElementById('stats-charts-box');
        chartsBox.innerHTML = ''; // 이전 그래프 청소

        // 13개 카테고리 순회하면서 실시간 개수 기반 막대그래프 노출
        Object.keys(socCategories).forEach(category => {
            const count = allPlacesData.filter(item => item.customCategory === category).length;
            const colorClass = socCategories[category].color;
            
            // 데이터 수치 비례율 게이지 계산 (최대 10개 기준)
            const percentage = Math.min((count / 10) * 100, 100);

            const rowHtml = `
                <div class="chart-row">
                    <div class="chart-label"><span>${category}</span><strong>${count}개</strong></div>
                    <div class="bar-container"><div class="bar-fill bg-${colorClass}" style="width: ${percentage}%"></div></div>
                </div>
            `;
            chartsBox.innerHTML += rowHtml;
        });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1000;
    }

    function clearPreviousMarkersOnly() {
        for (let i = 0; i < markers.length; i++) { markers[i].setMap(null); }
        markers = [];
    }

    function clearPreviousResults() {
        clearPreviousMarkersOnly();
        document.getElementById('result-list').innerHTML = '';
        document.getElementById('count-num').innerText = '0';
    }

    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }
</script>

</body>
</html>
