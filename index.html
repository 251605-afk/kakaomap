<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리동네 생활 SOC 시설 지도</title>
    <style>
        /* 기본 레이아웃 및 공공서비스 디자인 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; color: #333; }

        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 */
        #sidebar {
            width: 380px;
            height: 100%;
            padding: 20px;
            background: #ffffff;
            box-shadow: 3px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* 서비스 타이틀 */
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 안내 가이드 */
        .step-guide {
            font-size: 12px;
            color: #2563eb;
            font-weight: bold;
            margin-bottom: 6px;
        }

        /* 1단계: 지역 검색창 */
        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 18px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: 2px solid #1e3a8a;
        }

        .search-btn {
            padding: 12px 14px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .search-btn:hover {
            background: #172554;
        }

        /* 2단계: 시설 카테고리 선택 (라디오 버튼 스타일) */
        .category-group {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .category-label {
            flex: 1;
            text-align: center;
        }

        .category-label input[type="radio"] {
            display: none;
        }

        .category-label span {
            display: block;
            padding: 12px 5px;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        /* 비활성화 상태 스타일 */
        .category-label.disabled span {
            background: #f8fafc;
            color: #cbd5e1;
            cursor: not-allowed;
        }

        .category-label input[type="radio"]:checked + span {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        /* 탭 시스템 */
        .tab-menu {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            color: #64748b;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #1e3a8a;
            border-bottom: 3px solid #1e3a8a;
            margin-bottom: -2px;
        }

        /* 탭 콘텐츠 영역 */
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* 결과 카운트 */
        .result-count {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .result-count span {
            color: #ef4444;
            font-weight: bold;
        }

        /* 시설 목록 아이템 스타일 */
        #result-list {
            list-style: none;
        }

        .item {
            padding: 15px;
            border: 1px solid #f1f5f9;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .item strong {
            font-size: 15px;
            color: #0f172a;
            display: block;
            margin-bottom: 4px;
        }

        .item .address {
            font-size: 13px;
            color: #475569;
            margin-bottom: 2px;
        }

        .item .phone {
            font-size: 12px;
            color: #059669;
        }

        .item .distance {
            font-size: 11px;
            color: #ef4444;
            font-weight: bold;
            margin-top: 4px;
        }

        /* 분석 통계 화면 스타일 */
        .stats-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .stats-title {
            font-size: 14px;
            font-weight: bold;
            color: #334155;
            margin-bottom: 10px;
        }

        .chart-row {
            margin-bottom: 12px;
        }

        .chart-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #475569;
            margin-bottom: 4px;
        }

        .bar-container {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .bg-blue { background: #2563eb; }
        .bg-green { background: #16a34a; }
        .bg-red { background: #dc2626; }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* 인포윈도우 스타일 */
        .info-window {
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
            width: 220px;
        }
        .info-window strong { color: #1e3a8a; font-size: 13px; display: block; margin-bottom: 4px;}
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="title">
