<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생활 SOC 시설 실시간 탐색 서비스</title>
    <style>
        /* 기본 레이아웃 및 공공서비스 스타일 디자인 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; color: #333; }

        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 */
        #sidebar {
            width: 380px;
            height: 100%;
            padding: 20px;
            background: #ffffff;
            box-shadow: 3px 0 10px rgba(0,0,0,0.08);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* 메인 타이틀 */
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a; /* 신뢰감을 주는 네이비 색상 */
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            padding: 12px 18px;
            background: #2563eb; /* 공공 웹사이트 표준 블루 */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        /* 검색 결과 통계 수치 */
        .result-count {
            font-size: 13px;
            color: #64748b;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 10px;
        }

        .result-count span {
            color: #2563eb;
            font-weight: bold;
        }

        /* 리스트 영역 */
        #result-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .item {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            background: #fff;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .item:hover {
            background: #f8fafc;
            border-left-color: #2563eb;
            transform: translateX(2px);
        }

        /* 카테고리별 왼쪽 테두리 색상 구분 */
        .item.library { border-left-color: #10b981; }  /* 도서관: 초록 */
        .item.gym { border-left-color: #f59e0b; }      /* 체육관: 주황 */
        .item.welfare { border-left-color: #8b5cf6; }  /* 복지관: 보라 */

        .item strong {
            display: block;
            font-size: 15px;
            margin-bottom: 6px;
            color: #1e293b;
        }

        .item small {
            color: #64748b;
            font-size: 12px;
            display: block;
            margin-bottom: 4px;
        }

        .distance {
            font-size: 11px;
            color: #2563eb;
            font-weight: bold;
        }

        /* 오른쪽 지도 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* 인포윈도우 스타일 정돈 */
        .info-window {
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 220px;
        }
        .info-window strong { color: #1e3a8a; display: block; margin-bottom: 6px; font-size: 14px; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="title">🏛️ 생활 SOC 시설 탐색기</div>
        <div class="search-box">
            <input type="text" id="keyword" placeholder="동네 이름이나 시설(예: 도서관) 입력">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <div class="result-count">검색 결과: <span id="count-num">0</span>개 (내 위치 기준 가까운 순)</div>
        <ul id="result-list">
            </ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

<script>
    // 전역 변수 선언
    let map;
    let ps; 
    let currentCenter = null; // 사용자의 현재 위치 좌표 저장용
    let markers = []; 
    let currentInfoWindow = null; 

    // 페이지 로딩 완료 후 실행
    window.onload = function() {
        initMap();
    };

    // 지도 초기 구성 함수
    function initMap() {
        const mapContainer = document.getElementById('map'); 
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 서울시청 위치
            level: 5 
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();

        // 브라우저 GPS 기반 현재 위치 수집
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude; 
                const lon = position.coords.longitude; 
                currentCenter = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(currentCenter);
                
                // 사용자 위치 중심점 마커 표시
                const userMarker = new kakao.maps.Marker({
                    map: map,
                    position: currentCenter
                });
                const infoWindow = new kakao.maps.InfoWindow({
                    content: '<div style="padding:5px; font-size:12px;">현재 내 위치</div>'
                });
                infoWindow.open(map, userMarker);
            });
        }
    }

    // 기존 검색 데이터 삭제 및 지도 초기화
    function clearPreviousResults() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = []; 
        document.getElementById('result-list').innerHTML = '';
        document.getElementById('count-num').innerText = '0';
        if (currentInfoWindow) {
            currentInfoWindow.close();
        }
    }

    // 시설 검색 핸들러
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('검색어를 입력해주세요!');
            return;
        }

        clearPreviousResults();

        // 검색 옵션 객체 생성
        const searchOptions = {};
        
        // 사용자의 현재 위치가 파악되어 있다면, 해당 위치 기준 거리순(ACCURACY) 정렬 옵션 부여
        if (currentCenter) {
            searchOptions.location = currentCenter;
            searchOptions.sort = kakao.maps.services.SortBy.ACCURACY; 
        }

        // 카카오 API 검색 실행
        ps.keywordSearch(keyword, placesSearchCB, searchOptions);
    }

    // 검색 결과 콜백 처리 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displaySocPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('검색 과정 중 시스템 오류가 발생했습니다.');
        }
    }

    // 카테고리별 식별 텍스트 변환 및 마커 이미지 분기 함수
    function getCategoryType(placeName) {
        if (placeName.includes('도서관')) return { className: 'library', color: 'green' };
        if (placeName.includes('체육') || placeName.includes('스포츠') || placeName.includes('운동')) return { className: 'gym', color: 'orange' };
        if (placeName.includes('복지')) return { className: 'welfare', color: 'purple' };
        return { className: 'default', color: 'blue' };
    }

    // 검색된 생활 SOC 결과를 화면과 지도에 그리는 메인 로직
    function displaySocPlaces(places) {
        const listEl = document.getElementById('result-list');
        const countNumEl = document.getElementById('count-num');
        const bounds = new kakao.maps.LatLngBounds();

        // 상단에 총 검색 결과 개수 바인딩
        countNumEl.innerText = places.length;

        for (let i = 0; i < places.length; i++) {
            const place = places[i];
            const placePosition = new kakao.maps.LatLng(place.y, place.x);
            
            // 키워드 매칭을 통해 카테고리 속성 분류 추출
            const category = getCategoryType(place.place_name);

            // 거리 데이터 가공 처리 (미터 단위를 키로미터 형태로 깔끔하게 변환)
            const distanceText = place.distance ? `${(parseInt(place.distance) / 1000).toFixed(1)}km 떨어짐` : '';

            // 1. 왼쪽 사이드바 리스트 템플릿 생성
            const itemEl = document.createElement('li');
            itemEl.className = `item ${category.className}`;
            itemEl.innerHTML = `
                <strong>${place.place_name}</strong>
                <small>주소: ${place.address_name}</small>
                ${place.phone ? `<small>전화: ${place.phone}</small>` : ''}
                <span class="distance">📍 ${distanceText}</span>
            `;
            listEl.appendChild(itemEl);

            // 2. 카테고리 색상에 따른 마커 커스텀 이미지 주소 맵핑 (카카오 기본 리소스 및 오픈소스 마커 활용)
            let markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png'; // 기본 파랑
            if (category.color === 'green') markerImageUrl = 'https://t1.daumcdn.net/mapwin/images/marker/mu_green.png';
            if (category.color === 'orange') markerImageUrl = 'https://t1.daumcdn.net/mapwin/images/marker/mu_orange.png';
            if (category.color === 'purple') markerImageUrl = 'https://t1.daumcdn.net/mapwin/images/marker/mu_purple.png';

            const markerImageSize = new kakao.maps.Size(30, 35);
            const markerImage = new kakao.maps.MarkerImage(markerImageUrl, markerImageSize);

            // 지도 상 마커 객체 인스턴스 생성
            const marker = new kakao.maps.Marker({
                map: map,
                position: placePosition,
                image: markerImage
            });
            markers.push(marker);

            // 3. 팝업(인포윈도우) 내부 디자인 정의
            const contentString = `
                <div class="info-window">
                    <strong>${place.place_name}</strong>
                    <p style="margin-bottom: 4px;"><b>주소:</b> ${place.address_name}</p>
                    <p><b>전화번호:</b> ${place.phone ? place.phone : '정보 없음'}</p>
                </div>
            `;

            const infoWindow = new kakao.maps.InfoWindow({
                content: contentString,
                removable: true
            });

            // 마커 고유 클릭 이벤트 연결
            kakao.maps.event.addListener(marker, 'click', function() {
                if (currentInfoWindow) currentInfoWindow.close();
                infoWindow.open(map, marker);
                currentInfoWindow = infoWindow;
            });

            // 왼쪽 사이드 리스트 엘리먼트 클릭 연동
            itemEl.onclick = function() {
                if (currentInfoWindow) currentInfoWindow.close();
                infoWindow.open(map, marker);
                currentInfoWindow = infoWindow;
                map.panTo(placePosition); // 클릭한 타겟 위치로 지도 부드럽게 중심 축 변환
            };

            bounds.extend(placePosition);
        }

        // 전체 마커 밸런스에 맞춰 카메라 화각 리사이징
        map.setBounds(bounds);
    }
</script>

</body>
</html>
