<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생활 SOC 시설 실시간 탐색 서비스</title>
    <style>
        /* 기본 레이아웃 및 공공서비스 스타일 디자인 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; color: #333; }

        #container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 */
        #sidebar {
            width: 380px;
            height: 100%;
            padding: 20px;
            background: #ffffff;
            box-shadow: 3px 0 10px rgba(0,0,0,0.08);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* 메인 타이틀 */
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a; /* 신뢰감을 주는 네이비 색상 */
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 상단 메인 탭 스타일 */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 5px;
            background: none;
            color: #64748b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: #e2e8f0;
            color: #334155;
        }

        .tab-btn.active {
            background: #2563eb;
            color: white;
        }

        /* 검색 영역 */
        .search-box {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .search-btn {
            padding: 12px 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #1d4ed8;
        }

        /* 하위 카테고리 태그 컨테이너 */
        .sub-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .cat-tag {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        /* 카테고리별 활성화 색상 구분 디자인 */
        .cat-tag.active.all { background: #334155; color: white; border-color: #334155; }
        .cat-tag.active.medical { background: #ef4444; color: white; border-color: #ef4444; }
        .cat-tag.active.welfare { background: #8b5cf6; color: white; border-color: #8b5cf6; }
        .cat-tag.active.culture { background: #10b981; color: white; border-color: #10b981; }
        .cat-tag.active.sports { background: #f59e0b; color: white; border-color: #f59e0b; }

        /* 검색 결과 통계 수치 */
        .result-count {
            font-size: 13px;
            color: #64748b;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 10px;
        }

        .result-count span {
            color: #2563eb;
            font-weight: bold;
        }

        /* 리스트 영역 */
        #result-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .item {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            background: #fff;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .item:hover {
            background: #f8fafc;
            border-left-color: #2563eb;
            transform: translateX(2px);
        }

        /* 카테고리별 왼쪽 테두리 색상 구분 */
        .item.medical { border-left-color: #ef4444; }   /* 의료/보건: 빨강 */
        .item.welfare { border-left-color: #8b5cf6; }   /* 공공/복지: 보라 */
        .item.culture { border-left-color: #10b981; }   /* 교육/문화: 초록 */
        .item.sports { border-left-color: #f59e0b; }    /* 체육/휴양: 주황 */

        .item strong {
            display: block;
            font-size: 15px;
            margin-bottom: 6px;
            color: #1e293b;
        }

        .item small {
            color: #64748b;
            font-size: 12px;
            display: block;
            margin-bottom: 4px;
        }

        .distance {
            font-size: 11px;
            color: #2563eb;
            font-weight: bold;
        }

        /* 오른쪽 지도 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* 인포윈도우 스타일 정돈 */
        .info-window {
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 220px;
        }
        .info-window strong { color: #1e3a8a; display: block; margin-bottom: 6px; font-size: 14px; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="title">🏛️ 생활 SOC 시설 탐색기</div>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab1" onclick="switchTab(1)">의료·보건·복지</button>
            <button class="tab-btn" id="tab2" onclick="switchTab(2)">교육·문화·체육</button>
        </div>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="지역명 입력 (예: 홍대, 정릉동) 생략 가능" onkeyup="if(window.event.keyCode==13){searchPlaces()}">
            <button class="search-btn" onclick="searchPlaces()">검색</button>
        </div>

        <div class="sub-categories" id="sub-categories-box"></div>

        <div class="result-count">검색 결과: <span id="count-num">0</span>개 (내 위치 기준 가까운 순)</div>
        <ul id="result-list"></ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

<script>
    // 전역 변수 선언
    let map;
    let ps; 
    let currentCenter = null; 
    let markers = []; 
    let currentInfoWindow = null; 
    let currentTab = 1; 
    let currentSubCategory = 'ALL'; // 현재 선택된 하위 세부 카테고리 필터값

    // 탭별 제공할 하위 카테고리 메타데이터 정의
    const subCategoryMap = {
        1: [
            { id: 'ALL', name: '전체', type: 'all' },
            { id: 'MEDICAL', name: '🏥 병원/약국/보건소', type: 'medical' },
            { id: 'WELFARE', name: '🏢 주민센터/복지관', type: 'welfare' }
        ],
        2: [
            { id: 'ALL', name: '전체', type: 'all' },
            { id: 'CULTURE', name: '📚 도서관/박물관/학교', type: 'culture' },
            { id: 'SPORTS', name: '🏃 체육관/수영장/공원', type: 'sports' }
        ]
    };

    window.onload = function() {
        initMap();
        renderSubCategories();
    };

    function initMap() {
        const mapContainer = document.getElementById('map'); 
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), 
            level: 5 
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude; 
                const lon = position.coords.longitude; 
                currentCenter = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(currentCenter);
                
                const userMarker = new kakao.maps.Marker({
                    map: map,
                    position: currentCenter
                });
                const infoWindow = new kakao.maps.InfoWindow({
                    content: '<div style="padding:5px; font-size:12px;">현재 내 위치</div>'
                });
                infoWindow.open(map, userMarker);

                searchPlaces();
            }, function() {
                searchPlaces();
            });
        } else {
            searchPlaces();
        }
    }

    // 대분류 탭 전환
    function switchTab(tabNum) {
        if(currentTab === tabNum) return;
        currentTab = tabNum;
        currentSubCategory = 'ALL'; // 탭 전환 시 세부 카테고리는 전체로 초기화
        
        document.getElementById('tab1').classList.toggle('active', tabNum === 1);
        document.getElementById('tab2').classList.toggle('active', tabNum === 2);
        
        renderSubCategories();
        searchPlaces();
    }

    // 하위 카테고리 UI 렌더링 함수
    function renderSubCategories() {
        const box = document.getElementById('sub-categories-box');
        box.innerHTML = '';

        const categories = subCategoryMap[currentTab];
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `cat-tag ${cat.type}`;
            if (cat.id === currentSubCategory) {
                btn.classList.add('active');
            }
            btn.innerText = cat.name;
            btn.onclick = function() {
                // 기존 활성화 클래스 제거 후 현재 선택 카테고리 활성화
                const children = box.querySelectorAll('.cat-tag');
                children.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');

                currentSubCategory = cat.id;
                searchPlaces(); // 카테고리 클릭 시 즉시 실시간 재검색
            };
            box.appendChild(btn);
        });
    }

    function clearPreviousResults() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = []; 
        document.getElementById('result-list').innerHTML = '';
        document.getElementById('count-num').innerText = '0';
        if (currentInfoWindow) {
            currentInfoWindow.close();
        }
    }

    // 시설 검색 핵심 핸들러
    function searchPlaces() {
        const keywordInput = document.getElementById('keyword').value.trim();
        clearPreviousResults();

        const searchOptions = { size: 15 };
        if (currentCenter) {
            searchOptions.location = currentCenter;
            searchOptions.sort = kakao.maps.services.SortBy.ACCURACY; 
        }

        let searchTasks = [];

        // ----------------- [탭 1: 의료·보건·복지] 비동기 처리 분기 -----------------
        if (currentTab === 1) {
            // 병원/약국 카테고리가 켜져있거나 전체 선택일 때
            if (currentSubCategory === 'ALL' || currentSubCategory === 'MEDICAL') {
                ['HP8', 'PM9'].forEach(cat => {
                    searchTasks.push(new Promise((resolve) => {
                        ps.categorySearch(cat, (data, status) => {
                            resolve(status === kakao.maps.services.Status.OK ? data : []);
                        }, searchOptions);
                    }));
                });
                // 보건소 키워드 추가
                const hk = keywordInput ? `${keywordInput} 보건소` : '보건소';
                searchTasks.push(new Promise((resolve) => {
                    ps.keywordSearch(hk, (data, status) => resolve(status === kakao.maps.services.Status.OK ? data : []), searchOptions);
                }));
            }
            // 주민센터/복지관 카테고리가 켜져있거나 전체 선택일 때
            if (currentSubCategory === 'ALL' || currentSubCategory === 'WELFARE') {
                searchTasks.push(new Promise((resolve) => {
                    ps.categorySearch('PO3', (data, status) => {
                        resolve(status === kakao.maps.services.Status.OK ? data : []);
                    }, searchOptions);
                }));
                // 사회복지관 키워드 추가
                const wk = keywordInput ? `${keywordInput} 사회복지관` : '사회복지관';
                searchTasks.push(new Promise((resolve) => {
                    ps.keywordSearch(wk, (data, status) => resolve(status === kakao.maps.services.Status.OK ? data : []), searchOptions);
                }));
            }

        // ----------------- [탭 2: 교육·문화·체육] 비동기 처리 분기 -----------------
        } else if (currentTab === 2) {
            // 문화/학교 카테고리가 켜져있거나 전체 선택일 때
            if (currentSubCategory === 'ALL' || currentSubCategory === 'CULTURE') {
                ['CT1', 'SC4'].forEach(cat => {
                    searchTasks.push(new Promise((resolve) => {
                        ps.categorySearch(cat, (data, status) => {
                            resolve(status === kakao.maps.services.Status.OK ? data : []);
                        }, searchOptions);
                    }));
                });
                // 도서관, 박물관, 미술관 키워드 확장 보완
                ['도서관', '박물관', '미술관'].forEach(kw => {
                    const ck = keywordInput ? `${keywordInput} ${kw}` : kw;
                    searchTasks.push(new Promise((resolve) => {
                        ps.keywordSearch(ck, (data, status) => resolve(status === kakao.maps.services.Status.OK ? data : []), searchOptions);
                    }));
                });
            }
            // 체육관/수영장/공원이 켜져있거나 전체 선택일 때
            if (currentSubCategory === 'ALL' || currentSubCategory === 'SPORTS') {
                ['체육관', '수영장', '공원'].forEach(kw => {
                    const sk = keywordInput ? `${keywordInput} ${kw}` : kw;
                    searchTasks.push(new Promise((resolve) => {
                        ps.keywordSearch(sk, (data, status) => resolve(status === kakao.maps.services.Status.OK ? data : []), searchOptions);
                    }));
                });
            }
        }

        // 모든 카카오 API 호출 완료 후 병합 정렬 프로세스 진행
        Promise.all(searchTasks).then((results) => {
            let mergedData = [].concat(...results);
            // 중복 고유 ID 데이터 병합 거르기
            const uniqueData = Array.from(new Map(mergedData.map(item => [item.id, item])).values());

            // 검색어 창 입력 매칭 필터링
            let filteredData = uniqueData;
            if(keywordInput) { 
                filteredData = uniqueData.filter(place => 
                    place.address_name.includes(keywordInput) || place.place_name.includes(keywordInput)
                );
            }

            // 내 위치 기준 가장 근접한 거리 정렬 상위 연동
            filteredData.sort((a, b) => (parseInt(a.distance) || 0) - (parseInt(b.distance) || 0));

            if (filteredData.length > 0) {
                displaySocPlaces(filteredData);
            } else {
                document.getElementById('count-num').innerText = '0';
            }
        });
    }

    // 마커 분기 및 속성 스타일 판단용 유틸리티 함수
    function getCategoryProps(place) {
        const name = place.place_name;
        const catCode = place.category_group_code;

        if (catCode === 'HP8' || catCode === 'PM9' || name.includes('보건소')) {
            return { className: 'medical', color: 'red' }; 
        }
        if (catCode === 'PO3' || name.includes('복지')) {
            return { className: 'welfare', color: 'purple' }; 
        }
        if (catCode === 'CT1' || catCode === 'SC4' || name.includes('도서관') || name.includes('박물관') || name.includes('미술관')) {
            return { className: 'culture', color: 'green' }; 
        }
        if (name.includes('체육') || name.includes('스포츠') || name.includes('운동') || name.includes('수영장') || name.includes('공원')) {
            return { className: 'sports', color: 'orange' }; 
        }

        return { className: 'default', color: 'blue' };
    }

    // 리스트 바인딩 및 지도 마커 렌더링 처리
    function displaySocPlaces(places) {
        const listEl = document.getElementById('result-list');
        const countNumEl = document.getElementById('count-num');
        const bounds = new kakao.maps.LatLngBounds();

        countNumEl.innerText = places.length;

        for (let i = 0; i < places.length; i++) {
            const place = places[i];
            const placePosition = new kakao.maps.LatLng(place.y, place.x);
            const category = getCategoryProps(place);
            const distanceText = place.distance ? `${(parseInt(place.distance) / 1000).toFixed(1)}km 떨어짐` : '거리 정보 없음';

            // 1. 왼쪽 결과 리스트 조립
            const itemEl = document.createElement('li');
            itemEl.className = `item ${category.className}`;
            itemEl.innerHTML = `
                <strong>${place.place_name}</strong>
                <small>주소: ${place.address_name}</small>
                ${place.phone ? `<small>전화: ${place.phone}</small>` : ''}
                <span class="distance">📍 ${distanceText}</span>
            `;
            listEl.appendChild(itemEl);

            // 2. 카테고리 성격별 마커 이미지 세팅
            let markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png';
            if (category.color === 'red') markerImageUrl = 'https://t1.daumcdn.net/mapwin/images/marker/mu_red.png';
            if (category.color === 'purple') markerImageUrl = 'https://t1.daumcdn.net/mapwin/images/marker/mu_purple.png';
            if (category.color === 'green') markerImageUrl = 'https://t1.daumcdn.net/mapwin/images/marker/mu_green.png';
            if (category.color === 'orange') markerImageUrl = 'https://t1.daumcdn.net/mapwin/images/marker/mu_orange.png';

            const markerImageSize = new kakao.maps.Size(30, 35);
            const markerImage = new kakao.maps.MarkerImage(markerImageUrl, markerImageSize);

            const marker = new kakao.maps.Marker({
                map: map,
                position: placePosition,
                image: markerImage
            });
            markers.push(marker);

            // 3. 인포윈도우 바인딩 처리
            const contentString = `
                <div class="info-window">
                    <strong>${place.place_name}</strong>
                    <p style="margin-bottom: 4px;"><b>주소:</b> ${place.address_name}</p>
                    <p><b>전화번호:</b> ${place.phone ? place.phone : '정보 없음'}</p>
                </div>
            `;

            const infoWindow = new kakao.maps.InfoWindow({
                content: contentString,
                removable: true
            });

            // 마커 클릭 시 액션
            kakao.maps.event.addListener(marker, 'click', function() {
                if (currentInfoWindow) currentInfoWindow.close();
                infoWindow.open(map, marker);
                currentInfoWindow = infoWindow;
            });

            // 리스트 엘리먼트 클릭 시 액션
            itemEl.onclick = function() {
                if (currentInfoWindow) currentInfoWindow.close();
                infoWindow.open(map, marker);
                currentInfoWindow = infoWindow;
                map.panTo(placePosition);
            };

            bounds.extend(placePosition);
        }

        map.setBounds(bounds);
    }
</script>

</body>
</html>
