<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생활 SOC 시설 실시간 탐색 서비스</title>
    <style>
        /* 레이아웃 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; color: #333; overflow: hidden; }

        #container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 고정 */
        #sidebar {
            width: 380px;
            height: 100%;
            padding: 20px;
            background: #ffffff;
            box-shadow: 3px 0 10px rgba(0,0,0,0.08);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 메인 대분류 탭 */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 5px;
            background: transparent;
            color: #64748b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s;
        }

        .tab-btn.active { background: #2563eb; color: white; }

        /* 검색창 영역 */
        .search-box { display: flex; gap: 6px; margin-bottom: 12px; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #2563eb; }
        .search-btn { padding: 12px 18px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }

        /* 🎨 하위 카테고리 태그 스타일 */
        .sub-categories { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .cat-tag { padding: 8px 12px; font-size: 12px; font-weight: bold; border-radius: 20px; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; cursor: pointer; transition: all 0.2s; }
        
        /* 카테고리 활성화 테마 색상 (선택되었을 때만 테두리와 글자 강조) */
        .cat-tag.active.all { background: #334155; color: white; border-color: #334155; }
        .cat-tag.active.medical { background: #ef4444; color: white; border-color: #ef4444; }
        .cat-tag.active.welfare { background: #8b5cf6; color: white; border-color: #8b5cf6; }
        .cat-tag.active.culture { background: #10b981; color: white; border-color: #10b981; }
        .cat-tag.active.sports { background: #f59e0b; color: white; border-color: #f59e0b; }

        .result-count { font-size: 13px; color: #64748b; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; margin-bottom: 10px; }
        .result-count span { color: #2563eb; font-weight: bold; }

        /* 리스트 뷰 영역 */
        #result-list { list-style: none; overflow-y: auto; flex: 1; }
        .item { padding: 16px; border-bottom: 1px solid #f1f5f9; background: #fff; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid #cbd5e1; cursor: pointer; transition: all 0.2s; }
        .item:hover { background: #f8fafc; transform: translateX(2px); }

        /* 리스트 왼쪽 컬러 바 매칭 */
        .item.medical { border-left-color: #ef4444; }
        .item.welfare { border-left-color: #8b5cf6; }
        .item.culture { border-left-color: #10b981; }
        .item.sports { border-left-color: #f59e0b; }

        .item strong { display: block; font-size: 15px; margin-bottom: 6px; color: #1e293b; }
        .item small { color: #64748b; font-size: 12px; display: block; margin-bottom: 4px; }
        .distance { font-size: 11px; color: #2563eb; font-weight: bold; }

        /* 우측 지도 영역 */
        #map { flex: 1; height: 100%; background: #eef2f6; }

        /* 인포윈도우 */
        .info-window { padding: 12px; font-size: 13px; line-height: 1.5; min-width: 220px; }
        .info-window strong { color: #1e3a8a; display: block; margin-bottom: 6px; font-size: 14px; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="title">🏛️ 생활 SOC 시설 탐색기</div>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab1" onclick="switchTab(1)">의료·보건·복지</button>
            <button class="tab-btn" id="tab2" onclick="switchTab(2)">교육·문화·체육</button>
        </div>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="동네이름이나 시설 입력 (예: 식사동, 도서관)" onkeyup="if(window.event.keyCode==13){searchPlaces()}">
            <button class="search-btn" onclick="searchPlaces()">검색</button>
        </div>

        <div class="sub-categories" id="sub-categories-box"></div>

        <div class="result-count">검색 결과: <span id="count-num">0</span>개</div>
        <ul id="result-list"></ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7ff57a6ed07f630d6c35967506af559c&libraries=services"></script>

<script>
    let map;
    let ps; 
    let markers = []; 
    let currentInfoWindow = null; 
    let currentTab = 1; 
    let currentSubCategory = 'ALL'; 

    // 카카오 카테고리 검색 최적화 단어 매핑
    const subCategoryMap = {
        1: [
            { id: 'ALL', name: '전체 보기', type: 'all', query: '복지관' },
            { id: 'MEDICAL', name: '🏥 병원/약국/보건소', type: 'medical', query: '보건소' },
            { id: 'WELFARE', name: '🏢 주민센터/복지관', type: '주민센터' }
        ],
        2: [
            { id: 'ALL', name: '전체 보기', type: 'all', query: '도서관' },
            { id: 'CULTURE', name: '📚 도서관/박물관/학교', type: 'culture', query: '도서관' },
            { id: 'SPORTS', name: '🏃 체육관/수영장/공원', type: 'sports', query: '체육관' }
        ]
    };

    window.onload = function() {
        initMap();
    };

    function initMap() {
        const mapContainer = document.getElementById('map'); 
        
        // 이미지 속 식사동/위시티 인근의 좌표를 기본 스타트 지점으로 단단히 고정
        const defaultPosition = new kakao.maps.LatLng(37.678303, 126.832958);

        const mapOption = {
            center: defaultPosition, 
            level: 5 
        };

        // 지도 객체 생성 생성
        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();

        // 초기 화면 구동
        switchTab(1);
    }

    // 대분류 탭 핸들러
    function switchTab(tabNum) {
        currentTab = tabNum;
        currentSubCategory = 'ALL'; 
        
        document.getElementById('tab1').classList.toggle('active', tabNum === 1);
        document.getElementById('tab2').classList.toggle('active', tabNum === 2);
        
        renderSubCategoryButtons();
        searchPlaces(); 
    }

    // 소분류 버튼 동적 바인딩
    function renderSubCategoryButtons() {
        const box = document.getElementById('sub-categories-box');
        box.innerHTML = '';

        const currentList = subCategoryMap[currentTab];
        currentList.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `cat-tag ${cat.type}`;
            if (cat.id === currentSubCategory) btn.classList.add('active');
            
            btn.innerText = cat.name;
            btn.onclick = function() {
                box.querySelectorAll('.cat-tag').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentSubCategory = cat.id;
                searchPlaces(); 
            };
            box.appendChild(btn);
        });
    }

    // 결과물 왼쪽 테두리 색상 분기 처리 유틸
    function getCategoryProps(place) {
        const name = place.place_name;
        const catName = place.category_name || '';

        if (name.includes('병원') || name.includes('약국') || name.includes('보건') || catName.includes('의료')) {
            return { className: 'medical' };
        }
        if (name.includes('주민') || name.includes('복지') || name.includes('센터') || name.includes('동사무소') || name.includes('구청')) {
            return { className: 'welfare' };
        }
        if (name.includes('도서관') || name.includes('박물관') || name.includes('미술관') || name.includes('학교')) {
            return { className: 'culture' };
        }
        if (name.includes('체육') || name.includes('스포츠') || name.includes('수영장') || name.includes('공원') || name.includes('운동')) {
            return { className: 'sports' };
        }

        if (currentTab === 1) return { className: 'welfare' };
        return { className: 'culture' };
    }

    function clearResults() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        document.getElementById('result-list').innerHTML = '';
        document.getElementById('count-num').innerText = '0';
        if (currentInfoWindow) currentInfoWindow.close();
    }

    // 🔍 키워드 검색 통합 처리부
    function searchPlaces() {
        const keywordInput = document.getElementById('keyword').value.trim();
        clearResults();

        const selectedCat = subCategoryMap[currentTab].find(cat => cat.id === currentSubCategory);
        let baseQuery = selectedCat ? selectedCat.query : "시설";

        let searchQuery = keywordInput ? `${keywordInput} ${baseQuery}` : baseQuery;

        const searchOptions = {
            location: map.getCenter(), // 화면 움직였을 때 그 중심을 기준으로 연동
            radius: 5000,              
            size: 15
        };

        // 카카오 API 탐색 요청
        ps.keywordSearch(searchQuery, function(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displaySocPlaces(data);
            }
        }, searchOptions);
    }

    // 리스트 및 마커 표출 렌더러
    function displaySocPlaces(places) {
        const listEl = document.getElementById('result-list');
        const countNumEl = document.getElementById('count-num');
        const bounds = new kakao.maps.LatLngBounds();

        countNumEl.innerText = places.length;

        for (let i = 0; i < places.length; i++) {
            const place = places[i];
            const placePosition = new kakao.maps.LatLng(place.y, place.x);
            const props = getCategoryProps(place);
            const distanceText = place.distance ? `${(parseInt(place.distance) / 1000).toFixed(1)}km` : '확인불가';

            // 1. 결과 리스트 조립
            const itemEl = document.createElement('li');
            itemEl.className = `item ${props.className}`;
            itemEl.innerHTML = `
                <strong>${place.place_name}</strong>
                <small>주소: ${place.address_name}</small>
                ${place.phone ? `<small>전화: ${place.phone}</small>` : ''}
                <span class="distance">📍 중심 반경 약 ${distanceText}</span>
            `;
            listEl.appendChild(itemEl);

            // 2.
